{% extends 'base.html' %}
{% load static %}

{% block title %}Register{% endblock %}
{% block content %}
  <h2>Create Account</h2>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Sign Up</button>
  </form>
  <p>
    Already have an account?
    <a href="{% url 'accounts:login' %}">Log in</a>.
  </p>
{% endblock %}

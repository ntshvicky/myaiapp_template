{% extends 'base.html' %}
{% load static %}

{% block title %}Log In | MyAIApp{% endblock %}

{% block content %}
<div class="auth-container glass-card">
    <h2>Welcome Back</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Log In</button>
    </form>
    <div class="auth-links">
        <p>Don't have an account? <a href="{% url 'accounts:register' %}">Create one here</a>.</p>
    </div>
</div>
{% endblock %}

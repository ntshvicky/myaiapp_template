{% extends 'base.html' %}
{% load static %}

{% block title %}Log In{% endblock %}
{% block content %}
  <h2>Log In</h2>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Log In</button>
  </form>
  <p>
    Don’t have an account?
    <a href="{% url 'accounts:register' %}">Register here.</a>
  </p>
{% endblock %}
